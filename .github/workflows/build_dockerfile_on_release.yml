name: Build and publish production image

on:
  workflow_run:
    workflows:
      - Deploy to Firebase Hosting on merge
    branches:
      - main
      - master
    types:
      - completed
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  docker-image-release-push:
    if: >-
      ${{
        github.event_name == 'release' ||
        github.event.workflow_run.conclusion == 'success'
      }}
    runs-on: ubuntu-latest
    name: Push production docker image to Docker Hub
    steps:
      - name: Check out tested commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.workflow_run.head_sha }}

      - name: Extract image tag
        id: image_tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            tag="$RELEASE_TAG"
          else
            tag="sha-${HEAD_SHA}"
          fi
          tag="${tag//\//-}"
          tag="$(printf '%s' "$tag" | tr -c 'A-Za-z0-9_.-' '-')"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: clinicalgenomics/statina-ui:${{ steps.image_tag.outputs.tag }}
