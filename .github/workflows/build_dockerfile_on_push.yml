name: Build and publish docker image after PR CI

on:
  workflow_run:
    workflows:
      - Deploy to Firebase Hosting on PR
    types:
      - completed

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  docker-image-push:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    name: Create staging docker image
    steps:
      - name: Check out tested commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract preview image tag
        id: image_tag
        uses: actions/github-script@v9
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha
            const prs = context.payload.workflow_run.pull_requests || []
            let prNumber = prs[0]?.number

            if (!prNumber) {
              const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: sha,
              })
              prNumber = result.data.find((pr) => pr.head.sha === sha)?.number || result.data[0]?.number
            }

            if (!prNumber) {
              core.setFailed(`Could not find pull request number for ${sha}`)
              return
            }

            core.setOutput('tag', `pr-${prNumber}-${sha.slice(0, 8)}`)
            core.setOutput('pr_number', String(prNumber))
            core.setOutput('short_sha', sha.slice(0, 8))

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: clinicalgenomics/statina-ui-stage:${{ steps.image_tag.outputs.tag }}

      - name: Comment cg-orchestration preview URL
        uses: actions/github-script@v9
        with:
          script: |
            const prNumber = Number('${{ steps.image_tag.outputs.pr_number }}')
            const shortSha = '${{ steps.image_tag.outputs.short_sha }}'
            const imageTag = '${{ steps.image_tag.outputs.tag }}'
            const previewUrl = `https://${context.repo.repo}-preview.cg-orchestration.sys.scilifelab.se/pr-${prNumber}/`
            const marker = '<!-- cg-orchestration-preview-url -->'
            const body = [
              marker,
              `Visit the cg-orchestration preview URL for this PR (updated for commit \`${shortSha}\`):`,
              '',
              previewUrl,
              '',
              `Image tag: \`clinicalgenomics/statina-ui-stage:${imageTag}\``,
              '',
              '_Argo CD may need a few minutes to sync after the image is pushed. This preview is available from internal networks only._',
            ].join('\n')

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            })
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }
