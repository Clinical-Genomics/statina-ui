name: Build and publish docker image after PR CI

on:
  workflow_run:
    workflows:
      - Deploy to Firebase Hosting on PR
    types:
      - completed

permissions:
  contents: read
  pull-requests: read

jobs:
  docker-image-push:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    name: Create staging docker image
    steps:
      - name: Check out tested commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract preview image tag
        id: image_tag
        uses: actions/github-script@v9
        with:
          script: |
            const sha = context.payload.workflow_run.head_sha
            const prs = context.payload.workflow_run.pull_requests || []
            let prNumber = prs[0]?.number

            if (!prNumber) {
              const result = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: sha,
              })
              prNumber = result.data.find((pr) => pr.head.sha === sha)?.number || result.data[0]?.number
            }

            if (!prNumber) {
              core.setFailed(`Could not find pull request number for ${sha}`)
              return
            }

            core.setOutput('tag', `pr-${prNumber}-${sha.slice(0, 8)}`)

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: clinicalgenomics/statina-ui-stage:${{ steps.image_tag.outputs.tag }}
