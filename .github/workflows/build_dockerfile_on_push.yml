name: Build and publish docker image on push

on:
  push:
    branches-ignore:
      - main
      - master

jobs:
  docker-image-push:
    runs-on: ubuntu-latest
    name: Create staging docker image
    steps:
      - name: Check out git repository
        uses: actions/checkout@v5

      - name: Extract branch name and remove illegal chars
        id: get_branch_name
        shell: bash
        run: echo "branch=$(tr "/" "-" <<<${GITHUB_REF#refs/heads/})" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: "clinicalgenomics/statina-ui-stage:${{ steps.get_branch_name.outputs.branch }}, clinicalgenomics/statina-ui-stage:latest"
