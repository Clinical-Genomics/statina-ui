name: Build and publish docker image after PR CI

on:
  workflow_run:
    workflows:
      - Deploy to Firebase Hosting on PR
    types:
      - completed

jobs:
  docker-image-push:
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'pull_request' &&
        github.event.workflow_run.head_repository.full_name == github.repository
      }}
    runs-on: ubuntu-latest
    name: Create staging docker image
    steps:
      - name: Check out tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Extract branch tag
        id: image_tag
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          tag="${HEAD_BRANCH//\//-}"
          tag="$(printf '%s' "$tag" | tr -c 'A-Za-z0-9_.-' '-')"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./
          file: ./Dockerfile
          push: true
          tags: clinicalgenomics/statina-ui-stage:${{ steps.image_tag.outputs.tag }}
